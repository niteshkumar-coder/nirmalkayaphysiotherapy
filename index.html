    <!-- Polyfill to protect against read-only window.fetch assignment errors in sandboxed/iframe environments -->
    <script>
      try {
        var originalFetch = window.fetch;
        if (originalFetch) {
          var currentFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return currentFetch;
            },
            set: function(val) {
              currentFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn('Polyfill failed for window.fetch:', e);
      }
    </script>
